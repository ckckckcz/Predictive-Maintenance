# nginx.conf

# Rate Limiting — anti brute force & DDoS
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

upstream active_api {
    server api-blue:8080;
    # server api-green:8081;  ← uncomment saat switch
    
    keepalive 32;
}

server {
    listen 80;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    
    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    
    # Static Next.js (tidak membebani Golang)
    location / {
        root /var/www/blue;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # API dengan rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://active_api;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Login endpoint — lebih ketat
    location /api/v1/auth/login {
        limit_req zone=login burst=5;
        proxy_pass http://active_api;
    }
    
    # Health check — public
    location /health {
        proxy_pass http://active_api/api/v1/health;
        access_log off;
    }
}