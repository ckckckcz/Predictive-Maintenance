services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/username/predictive-maintenance-backend:latest}
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/username/predictive-maintenance-frontend:latest}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
